name: Security Test Automation with OWASP ZAP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --- ZAP is started manually, NOT as a service ---
      - name: Start ZAP daemon
        run: |
          docker run -d --name zap \
            -p 8080:8080 \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon -port 8080 -host 0.0.0.0 \
            -config api.key=test123 \
            -config api.addrs.addr.name=.* \
            -config api.addrs.addr.regex=true

      - name: Wait for ZAP to be ready
        run: sleep 15

      - name: Run security scan
        run: pytest
        env:
          ZAP_ADDRESS: localhost   # because ZAP runs on the same host now
          ZAP_PORT: 8080
          ZAP_API_KEY: test123

      # Clean up the container no matter what
      - name: Stop ZAP
        if: always()
        run: docker stop zap && docker rm zap
