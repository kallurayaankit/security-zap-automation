name: Security Test Automation with OWASP ZAP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    services:
      zap:
        image: ghcr.io/zaproxy/zaproxy:stable
        ports:
          - 8080:8080
        # ZAP is configured via environment variables – no custom command needed
        env:
          ZAP_PORT: 8080
          ZAP_HOST: 0.0.0.0
          ZAP_API_KEY: test123
          ZAP_API_ADDRS_ADDR_NAME: ".*"
          ZAP_API_ADDRS_ADDR_REGEX: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for ZAP to start
        run: sleep 10

      - name: Run security scan
        run: pytest
        env:
          ZAP_ADDRESS: zap
          ZAP_PORT: 8080
          ZAP_API_KEY: test123
