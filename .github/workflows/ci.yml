name: Security Scan with OWASP ZAP

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      zap:
        image: ghcr.io/zaproxy/zaproxy:stable
        ports:
          - 8080:8080
        # Correct command: only pass arguments to the default entrypoint (zap.sh)
        options: >-
          -- -daemon -port 8080 -host 0.0.0.0
          -config api.key=test123
          -config api.addrs.addr.name=.*
          -config api.addrs.addr.regex=true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run security test
        run: pytest --html=reports/report.html --self-contained-html
        env:
          ZAP_HOST: localhost
          ZAP_PORT: 8080
          ZAP_API_KEY: test123
      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/